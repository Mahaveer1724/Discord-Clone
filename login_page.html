<!DOCTYPE html>
<html>
  <head>
    <title>Discord</title>
    <style>
      *{
        margin : 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body{
        height: 100%;
        width: 100%;
      }

      .js-container{
        background-color: aqua;
        position: relative;
      }

      #discord{
        margin-left: 40px;
        margin-top: 20px;
      }

      #main_login_box{
        position: absolute;
        right: 30%;
        height: 400px;
        width: 800px;
        padding: 20px;
        background-color: antiquewhite;
        margin: 150px 100px;
      }

      #login{
        width: 100%;
        margin-left: 10px;
        margin-right: 10px;
        background-color: rgb(42, 42, 125);
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function Title (){
        return (
          <h3 id="discord">
            <b>Discord</b>
          </h3>
        )
      }

      function Login_attributes () {
        return(
          <>
            <h1>
              Welcome Back !
            </h1>

            <h3>
              We are so excited to see you again !
            </h3>

            <h2>
              Email or Phone No.
            </h2> 
            
            <input />

            <h2>
              Password
            </h2>

            <input />

            <h5>
              Forgot your Password?
            </h5>

            <button id="login">
              Login
            </button>

            <h5>
              Need an account? <u>Register</u>
            </h5>
          </>
        )
      }

      function Login_box (){
        return(
          <div id="main_login_box">
            <Login_attributes />
          </div>
        )
      }

      function LOGIN (){
        return(
          <>
            <Title />
            <Login_box />
          </>
        )
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<LOGIN />);
    </script>
  </body>
</html>
